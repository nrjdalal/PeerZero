name: Desktop Release

# Builds the PeerZero desktop app for macOS (Apple Silicon + Intel), Windows, and Linux,
# and uploads the installers to a draft GitHub release. Trigger by pushing a `desktop-v*`
# tag or running the workflow manually. Signing/notarization + the updater signature are
# read from repo secrets (see desktop/README.md); the build works unsigned without them.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            rust_target: aarch64-apple-darwin
          - platform: macos-13 # Intel (x86_64)
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev patchelf \
            build-essential curl wget file libssl-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build backend bundle, static UI, and the Bun sidecar
        shell: bash
        env:
          NODE_ENV: production
          # The static UI bakes this and calls the sidecar's local Hono API at runtime.
          NEXT_PUBLIC_API_URL: http://127.0.0.1:47821
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:47821
        run: |
          bunx turbo run build --filter=@api/hono
          bunx turbo run build --filter=@web/next
          mkdir -p desktop/src-tauri/binaries
          EXT=""
          [ "${{ matrix.platform }}" = "windows-latest" ] && EXT=".exe"
          bun desktop/backend/build.ts "desktop/src-tauri/binaries/peerzero-backend-${{ matrix.rust_target }}${EXT}"

      - name: Build app + create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auto-updater signature (required for the updater artifacts; see desktop/README.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (optional: unsigned/ad-hoc if these are unset).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: desktop-v__VERSION__
          releaseName: PeerZero v__VERSION__
          releaseBody: |
            Desktop builds of PeerZero. Download the installer for your OS below.

            - macOS: `.dmg` (separate Apple Silicon / Intel builds)
            - Windows: `.exe` (NSIS) / `.msi`
            - Linux: `.AppImage` / `.deb`

            Unsigned builds need a manual bypass on first launch (macOS: right-click -> Open).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}
